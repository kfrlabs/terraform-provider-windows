# Documentation drift gate: regenerates docs/ from the live provider schema
# (tfplugindocs).
#
# CURRENT MODE = SCHEMA VALIDATION ONLY (drift step is non-blocking).
#
# Why: docs/ today is hand-written; the only template under templates/ is
# index.md.tmpl. tfplugindocs falls back to its built-in minimal template
# for every per-resource page, which produces strictly less content than
# the curated Markdown that already lives in docs/. Enforcing strict drift
# right now would silently delete ~700 lines of human-written content
# (examples, troubleshooting, narrative) on the next refresh.
#
# What still works as a hard gate:
#   - tfplugindocs runs `terraform providers schema -json` on the live
#     provider. ANY invalid schema (e.g. an attribute declared both
#     Required and Computed) fails the workflow. This already paid off
#     once during Tier 4 by surfacing the long-standing bug on
#     `windows_registry_value.hive`.
#
# TODO (separate PR, tracked outside Tier 4):
#   1. Migrate the curated content from docs/resources/*.md and
#      docs/data-sources/*.md into templates/{resources,data-sources}/*.md.tmpl
#      using the tfplugindocs template directives ({{ .SchemaMarkdown }},
#      {{ tffile "examples/..." }}, etc.).
#   2. Run `go generate ./...` until the worktree is stable.
#   3. Flip `continue-on-error` to `false` (or remove it) in the drift
#      step below. The gate then becomes truly enforcing.

name: docs

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    paths:
      - "internal/provider/**"
      - "examples/**"
      - "templates/**"
      - "generate.go"
      - "tools/**"
      - "go.mod"
      - ".github/workflows/docs.yml"

permissions:
  contents: read

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  generate:
    name: tfplugindocs drift check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      # tfplugindocs invokes `terraform providers schema -json` under the
      # hood. Pre-installing the CLI avoids the buggy auto-download path
      # in terraform-plugin-docs <=0.20.1 (expired GPG signing key when
      # the tool tries to fetch Terraform from releases.hashicorp.com).
      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: 1.9.8
          terraform_wrapper: false

      - name: go generate ./...
        run: go generate ./...

      - name: detect drift (non-blocking, see workflow header)
        continue-on-error: true
        run: |
          if ! git diff --quiet -- docs/; then
            echo "::warning::docs/ drifts from the schema-rendered output."
            echo "This is currently NON-BLOCKING because templates/ are stubs."
            echo "See the workflow file header for the migration plan."
            git --no-pager diff --stat -- docs/
            exit 1
          fi
          echo "docs/ is in sync with templates/ + schema."
